<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruth Chew</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-primary:       #6062c6;
      --c-primary-light: #e8e8ff;
      --c-bg:            #fbfbff;
      --c-surface:       #f8f8ff;
      --c-text:          #1e293b;
      --c-text-muted:    #64748b;
      --c-border:        #e2e8f0;
      --c-border-strong: #c5c5e8;
    }

    body {
      font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 560px;
    }

    .name {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 0.5rem;
    }

    .bio {
      font-size: 0.975rem;
      color: var(--c-text-muted);
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    .bio a {
      color: var(--c-primary);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid var(--c-border-strong);
      color: var(--c-text);
      background: var(--c-surface);
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }

    .link-btn:hover {
      border-color: var(--c-primary);
      background: var(--c-primary-light);
      color: var(--c-primary);
    }

    .divider {
      height: 1px;
      background: linear-gradient(to right, var(--c-primary) 0%, var(--c-primary) 30%, var(--c-border) 100%);
      margin-bottom: 1.5rem;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--c-text-muted);
      margin-bottom: 0.9rem;
    }

    .project-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .project-link {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--c-border);
      background: var(--c-surface);
      text-decoration: none;
      color: var(--c-text);
      transition: border-color 0.15s, background 0.15s;
    }

    .project-link:hover {
      border-color: var(--c-primary);
      background: var(--c-primary-light);
    }

    .project-name {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--c-primary);
      white-space: nowrap;
    }

    .project-desc {
      font-size: 0.875rem;
      color: var(--c-text-muted);
      line-height: 1.4;
    }

    .footer {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: var(--c-text-muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="name">Ruth W. T. Chew</h1>
    <p class="bio">
      Research Associate at NUS, working on Bayesian optimization and LLMs.<br>
    </p>

    <div class="links">
      <a class="link-btn" href="https://ruthchewwt.com" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Main site
      </a>
      <a class="link-btn" href="https://github.com/chewwt" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.1.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.74-1.33-1.74-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.04.13 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.69.83.57C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
        GitHub
      </a>
    </div>

    <div class="divider"></div>
    <div class="section-label">Projects</div>

    <div class="project-list">
      <a class="project-link" href="/bolt/">
        <span class="project-name">BoLT</span>
        <span class="project-desc">Black-box optimization benchmark for LLM tasks — HPO, data mixture, and prompt optimization.</span>
      </a>
    </div>
  </main>

  <footer class="footer">chewwt.github.io</footer>
</body>
</html>
