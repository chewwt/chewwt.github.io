# ============================================================
# ABSTRACT
# ============================================================
tagline: >
  [[bolt]] is the first BBO benchmark grounded in real LLM experiments, accessible without large-scale compute.

abstract: >
  LLMs involve expensive, derivative-free decisions — hyperparameters, data mixtures, prompts — that black-box
  optimization (BBO) is built to handle. Yet most BBO research validates on synthetic functions that miss the real
  structure of LLM tasks. [[bolt]] provides surrogate-based benchmarks grounded in real LLM experiments, so everyone
  can evaluate BBO methods against realistic objectives.

stats:
  - value: "3"
    label: "task families"
  - value: "10"
    label: "LLM tasks"
  - value: "20k+"
    label: "real experiments"
  - value: "4"
    label: "emulators"

# ============================================================
# TEASER / OVERVIEW FIGURE
# Set image to "" to hide the section
# ============================================================
teaser:
  image: "assets/images/bolt/overview.png"
  caption: >
    <strong>[[bolt]] replaces slow LLM calls with a fast emulator.</strong>
    Without an emulator (left), a BBO loop must query real LLM runs which are slow and costly.
    With [[bolt]] (right), the BBO loop queries a lightweight emulator trained on real LLM experiments,
    returning emulated observations almost instantly and at negligible cost.

